name: Warm News Cache

on:
  schedule:
    # 4 times daily — KST 00:00 / 06:00 / 12:00 / 18:00
    - cron: '0 15 * * *'  # KST 00:00
    - cron: '0 21 * * *'  # KST 06:00
    - cron: '0 3 * * *'   # KST 12:00
    - cron: '0 9 * * *'   # KST 18:00
  workflow_dispatch: # manual trigger

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Notify start
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id":"${{ secrets.TELEGRAM_CHAT_ID }}","text":"🔄 <b>Cache Warm Started</b>\n12 countries","parse_mode":"HTML"}'

      - name: Warm cache for major countries
        run: |
          BASE="https://prism-4gy.pages.dev/api/news"
          COUNTRIES="US KR JP GB CN FR BR IN RU IR IL UA"
          SUCCESS=0
          FAIL=0

          fetch_with_retry() {
            local code=$1

            # Step 1: Collect RSS
            echo "  collect..."
            local cs=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "${BASE}/collect?country=${code}" \
              --max-time 30)
            if [ "$cs" != "200" ]; then
              echo "  ✗ collect failed ($cs)"
              return 1
            fi

            sleep 2

            # Step 2: Summarize with OpenAI (same endpoint, step=2)
            local attempt=0
            local max=2
            while [ $attempt -le $max ]; do
              echo "  summarize (attempt $((attempt+1)))..."
              local ss=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST "${BASE}/collect?country=${code}&lang=ko&step=2" \
                --max-time 90)
              if [ "$ss" = "200" ]; then
                echo "  ✓ $code done"
                return 0
              fi
              echo "  ✗ summarize status=$ss"
              attempt=$((attempt+1))
              [ $attempt -le $max ] && sleep 5
            done
            return 1
          }

          for code in $COUNTRIES; do
            echo "→ $code"
            if fetch_with_retry "$code"; then
              SUCCESS=$((SUCCESS+1))
            else
              FAIL=$((FAIL+1))
            fi
            sleep 3
          done

          echo "SUCCESS=$SUCCESS" >> $GITHUB_ENV
          echo "FAIL=$FAIL" >> $GITHUB_ENV

          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL countries failed"
            exit 1
          fi

      - name: Notify done
        if: always()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id":"${{ secrets.TELEGRAM_CHAT_ID }}","text":"✅ <b>Cache Warm Done</b>\nSuccess: '"${SUCCESS:-0}"' / Fail: '"${FAIL:-0}"'","parse_mode":"HTML"}'
