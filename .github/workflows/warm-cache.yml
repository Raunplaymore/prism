name: Warm News Cache

on:
  schedule:
    # 4 times daily — KST 00:00 / 06:00 / 12:00 / 18:00
    - cron: '0 15 * * *'  # KST 00:00
    - cron: '0 21 * * *'  # KST 06:00
    - cron: '0 3 * * *'   # KST 12:00
    - cron: '0 9 * * *'   # KST 18:00
  workflow_dispatch: # manual trigger

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Notify start
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id":"${{ secrets.TELEGRAM_CHAT_ID }}","text":"🔄 <b>Cache Warm Started</b>\n12 countries","parse_mode":"HTML"}'

      - name: Warm cache for major countries
        run: |
          BASE="https://prism-4gy.pages.dev/api/news"
          COUNTRIES="US KR JP GB CN FR BR IN RU IR IL UA"
          SUCCESS=0
          FAIL=0

          fetch_with_retry() {
            local code=$1
            local attempt=0
            local max=2
            while [ $attempt -le $max ]; do
              status=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST \
                -H "x-admin-secret: ${{ secrets.ADMIN_SECRET }}" \
                "${BASE}/refresh?country=${code}&lang=ko" \
                --max-time 90)
              if [ "$status" = "200" ]; then
                echo "  ✓ $code (attempt $((attempt+1)))"
                return 0
              fi
              echo "  ✗ $code status=$status (attempt $((attempt+1)))"
              attempt=$((attempt+1))
              [ $attempt -le $max ] && sleep 5
            done
            return 1
          }

          for code in $COUNTRIES; do
            echo "→ $code"
            if fetch_with_retry "$code"; then
              SUCCESS=$((SUCCESS+1))
            else
              FAIL=$((FAIL+1))
            fi
            sleep 3
          done

          echo "SUCCESS=$SUCCESS" >> $GITHUB_ENV
          echo "FAIL=$FAIL" >> $GITHUB_ENV

          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL countries failed"
            exit 1
          fi

      - name: Notify done
        if: always()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id":"${{ secrets.TELEGRAM_CHAT_ID }}","text":"✅ <b>Cache Warm Done</b>\nSuccess: '"${SUCCESS:-0}"' / Fail: '"${FAIL:-0}"'","parse_mode":"HTML"}'
