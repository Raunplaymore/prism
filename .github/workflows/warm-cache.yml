name: Warm News Cache

on:
  schedule:
    # 3 times daily — KST 06:00 / 12:00 / 18:00
    - cron: '0 21 * * *'  # KST 06:00
    - cron: '0 3 * * *'   # KST 12:00
    - cron: '0 9 * * *'   # KST 18:00
  workflow_dispatch: # manual trigger

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Notify start
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id":"${{ secrets.TELEGRAM_CHAT_ID }}","text":"🔄 <b>Cache Warm Started</b>\n9 countries × 2 langs","parse_mode":"HTML"}'

      - name: Warm cache for major countries
        run: |
          BASE="https://prism-4gy.pages.dev/api/news"
          COUNTRIES="US KR JP GB CN RU IR IL UA"
          SUCCESS=0
          FAIL=0

          for code in $COUNTRIES; do
            for lang in ko en; do
              echo "→ $code/$lang"
              status=$(curl -s -o /dev/null -w "%{http_code}" \
                "${BASE}?country=${code}&lang=${lang}&refresh=true" \
                --max-time 60)
              echo "  status: $status"
              if [ "$status" = "200" ]; then SUCCESS=$((SUCCESS+1)); else FAIL=$((FAIL+1)); fi
              sleep 2
            done
          done

          echo "SUCCESS=$SUCCESS" >> $GITHUB_ENV
          echo "FAIL=$FAIL" >> $GITHUB_ENV

      - name: Notify done
        if: always()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id":"${{ secrets.TELEGRAM_CHAT_ID }}","text":"✅ <b>Cache Warm Done</b>\nSuccess: '"${SUCCESS:-0}"' / Fail: '"${FAIL:-0}"'","parse_mode":"HTML"}'
