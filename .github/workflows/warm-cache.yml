name: Warm News Cache

on:
  schedule:
    # Every 6 hours — KST 06:00 / 12:00 / 18:00 / 00:00
    - cron: '0 21 * * *'  # KST 06:00
    - cron: '0 3 * * *'   # KST 12:00
    - cron: '0 9 * * *'   # KST 18:00
    - cron: '0 15 * * *'  # KST 00:00
  workflow_dispatch: # manual trigger

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Warm cache for major countries
        run: |
          BASE="https://prism-4gy.pages.dev/api/news"
          COUNTRIES="US KR JP GB CN RU IR IL UA"

          for code in $COUNTRIES; do
            for lang in ko en; do
              echo "→ $code/$lang"
              status=$(curl -s -o /dev/null -w "%{http_code}" \
                "${BASE}?country=${code}&lang=${lang}&refresh=true" \
                --max-time 60)
              echo "  status: $status"
              sleep 2
            done
          done
          echo "Done."
